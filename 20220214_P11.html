<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>이미지 삽입</h3>
    <img src="img/animal-6924664_1920.jpg" width="300">
    <img src="img/mercedes-benz-2498264_1920.jpg" title="메르세데스 벤츠" width="300">
    <h3>오디오 듣기</h3>
    <audio src="img/Kalimba.mp3" controls autoplay loop></audio>
    <h3>비디오 보기</h3>
    <video width="320" height="240" controls autoplay>
    <source src="img/Wildlife.mp4" type="video/mp4">
    <source src="img/Wildlife.webm" alt="video/webm">
    </video>
</body>
</html>

<!-- 이미지는 <img> 태그 -->
<!-- 오디오는 <audio> 태그 -->
<!-- 비디오는 <source> 태그 -->
<!-- controls : 조작패널생성 / autoplay : 자동재생 / loop : 반복재생 -->
