<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table, tr, th, td {
            border: solid 1px black;
            border-collapse: collapse;
            padding: 8px;
        }
    </style>
</head>
<body>
    <h3>서해 앞바다 해상 예보</h3>
    <table>
        <tr>
            <th colspan="2">날짜</th>
            <td><b>날씨</b></td>
            <td><b>풍향</b></td>
            <td><b>풍속(m/s)</b></td>
        </tr>
        <tr>
            <td>24일(월)</td>
            <td>오후</td>
            <td>
                <img src="img/rain.png">
            </td>
            <td>남-남서</td>
            <td>3~7</td>
        </tr>
        <tr>
            <td rowspan="2">25일(화)</td>
            <td>오전</td>
            <td>
                <img src="img/rain.png">
            </td>
            <td>서-북서</td>
            <td>3~6</td>
        </tr>
        <tr>
            <td>오후</td>
            <td>
                <img src="img/shine.png">
            </td>
            <td>북서-서</td>
            <td>3~6</td>
        </tr>
    </table>
    <br>
    <footer>제공 - 기상청 기상 정보</footer>
</body>
</html>
