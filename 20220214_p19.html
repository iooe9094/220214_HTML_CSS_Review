<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table, tr, th, td {
            border: solid 1px black;
            border-collapse: collapse;
            padding: 8px;
        }
    </style>
</head>
<body>
    <h3>태풍정보</h3>
    <table>
        <tr>
            <th rowspan="2">일시</th>
            <th colspan="2">중심위치</th>
            <th rowspan="2">중심기압(hPa)</th>
            <th colspan="2">최대풍속</th>
        </tr>
        <tr>
            <td>위도</td><td>경도</td><td>초속(m/s)</td><td>시속(km/h)</td>
        </tr>
        <tr>
            <td>28일(금)</td>
            <td>5'</td>
            <td>10'</td>
            <td>100hPa</td>
            <td>10m/s</td>
            <td>15km/h</td>
        </tr>
        <tr>
            <td>29일(금)</td>
            <td>7'</td>
            <td>11'</td>
            <td>130hPa</td>
            <td>11m/s</td>
            <td>18km/h</td>
        </tr>
    </table>
    <br>
    <footer>참조 : 기상청</footer>
</body>
</html>
