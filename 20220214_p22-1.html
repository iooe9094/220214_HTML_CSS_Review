<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>개인 신상 정보 입력</h3>
    <form>
        <table border="1" align="center">
            <tr>
                <td>이름</td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td>비밀번호</td>
                <td><input type="password"></td>
            </tr>
            <tr>
                <td>이메일</td>
                <td><input type="text"> @ 
                <select>
                    <option>선택하세요</option>
                    <option>naver.com</option>
                    <option>hanmail.net</option>
                    <option>gmail.com</option>
                </select></td>
            </tr>
            <tr>
                <td>제목</td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td>내용</td>
                <td><textarea cols="30" rows="10"></textarea></td>
            </tr>
            <tr>
                <td>성별</td>
                <td><input type="radio"> 남성
                    <input type="radio"> 여성</td>
            </tr>
            <tr>
                <td>파일첨부</td>
                <td><input type="file"></td>
            </tr>
            <tr>
                <td><button>확인</button></td>
            </tr>
        </table>
    </form>
</body>
</html>

<!-- <table> 태그 사용하여 깔끔하게 작성 -->
<!-- 폼 태그 양식 (추후에도 소스 사용) -->
<!-- <table border =1 뒤에 align=center 값 넣으면 중앙에 배치 가능 -->
